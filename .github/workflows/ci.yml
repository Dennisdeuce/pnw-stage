name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  scraper-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Unit tests (live Ticketmaster test auto-skips without a key)
        run: python -m pytest -q
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}

  web-build-and-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Type-check + build
        run: npm run build
        env:
          # CI builds against placeholder env; real values come from Pages at deploy.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: E2E (Supabase REST is mocked in-test)
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: web/tests/__screens__/
          if-no-files-found: ignore
